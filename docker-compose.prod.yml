services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-v_fandex}
      POSTGRES_USER: ${POSTGRES_USER:-v_fandex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-v_fandex} -d ${POSTGRES_DB:-v_fandex}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-v_fandex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-v_fandex}?schema=public
    ports:
      - "${APP_PORT:-3000}:3000"
    command: sh -c "npx prisma db push && npx prisma db seed && node dist/main.js"

volumes:
  postgres_data:

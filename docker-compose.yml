services:
  postgres:
    image: postgres:16-alpine
    container_name: v-fandex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: v_fandex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d v_fandex"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
